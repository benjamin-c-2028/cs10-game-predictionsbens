name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    name: Package Windows executable
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build standalone EXE
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "Bitcoin-Up-or-Down-Arcade" `
            --add-data "asset-game;asset-game" `
            --collect-all arcade `
            --collect-all pyglet `
            game.py

      - name: Verify executable exists
        shell: pwsh
        run: |
          if (!(Test-Path "dist\Bitcoin-Up-or-Down-Arcade.exe")) {
            throw "dist\Bitcoin-Up-or-Down-Arcade.exe was not created"
          }

      - name: Upload Windows download
        uses: actions/upload-artifact@v4
        with:
          name: Bitcoin-Up-or-Down-Arcade-Windows
          path: dist/Bitcoin-Up-or-Down-Arcade.exe
          if-no-files-found: error
